# Dependabot config — npm ecosystem (Node/TypeScript/JavaScript)
# Grouped patch/minor updates to reduce PR spam.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"
        exclude-patterns:
          - "next"
          - "react"
          - "react-dom"
          - "typescript"
          - "@types/react"
          - "@types/react-dom"
      major-frameworks:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "typescript"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "major"
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "patch"
          - "minor"
    labels:
      - "dependencies"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
